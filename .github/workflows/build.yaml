name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Contract tests
        run: npm run test:contracts

      - name: Local smoke test
        run: npm run smoke:local
